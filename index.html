<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UbiPet</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('img/fondo.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.overlay {
  background: rgba(0,0,0,0.6);
  padding: 25px;
  border-radius: 12px;
}

/* PREVIEW */
#preview {
  padding: 30px 20px;
  max-width: 600px;
  margin: auto;
  line-height: 1.6;
  font-size: 18px;
}

/* BOTÓN DISCRETO */
.toggle-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: rgba(0,0,0,0.3);
  border: none;
  color: white;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  z-index: 999;
  font-size: 12px;
  opacity: 0.6;
}

/* PANEL */
.panel {
  position: fixed;
  top: 0;
  right: -100%;
  width: 350px;
  height: 100%;
  background: #fff;
  color: #000;
  transition: 0.3s;
  z-index: 998;
  display: flex;
  flex-direction: column;
}

.panel.open {
  right: 0;
}

.panel-content {
  padding: 15px;
  overflow-y: auto;
  flex: 1;
}

/* EDITOR */
#editor {
  min-height: 250px;
  background: #f5f5f5;
  padding: 10px;
  border-radius: 8px;
  outline: none;
}

/* BOTONES */
.panel button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  cursor: pointer;
  border-radius: 6px;
  font-weight: bold;
}

.save { background: #28a745; color: white; }
.clear { background: #dc3545; color: white; }

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="overlay">
    <h1>No es solo un QR</h1>
    <p>Es su forma de volver a casa 🐾</p>
  </div>
</div>

<!-- CONTENIDO -->
<div id="preview"></div>

<!-- BOTÓN OCULTO -->
<button class="toggle-btn" onclick="togglePanel()">✏️</button>

<!-- PANEL EDITOR -->
<div class="panel" id="panel">
  <div class="panel-content">

    <h3>Editor UbiPet</h3>

    <div id="editor" contenteditable="true"></div>

    <button class="save" onclick="guardar()">Guardar</button>
    <button class="clear" onclick="limpiar()">Limpiar</button>

  </div>
</div>

<script>

// ELEMENTOS
const editor = document.getElementById("editor");
const preview = document.getElementById("preview");

// ABRIR / CERRAR PANEL
function togglePanel() {
  document.getElementById("panel").classList.toggle("open");
}

// ACTUALIZAR EN VIVO
editor.addEventListener("input", () => {
  preview.innerHTML = editor.innerHTML;
});

// GUARDAR
function guardar() {
  localStorage.setItem("ubipet_content", editor.innerHTML);
}

// CARGAR
window.onload = () => {
  const data = localStorage.getItem("ubipet_content");
  if (data) {
    editor.innerHTML = data;
    preview.innerHTML = data;
  }
}

// LIMPIAR
function limpiar() {
  if(confirm("¿Borrar todo?")) {
    editor.innerHTML = "";
    preview.innerHTML = "";
    localStorage.removeItem("ubipet_content");
  }
}

</script>

</body>
</html>
