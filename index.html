<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>UbiPet Story</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Georgia", serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
    }

    /* CONTENEDOR PRINCIPAL */
    .story {
      width: 1080px;
      height: 1920px;
      background-color: #f5f1eb; /* beige UbiPet */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 80px 60px;
    }

    /* TEXTO SUPERIOR */
    .text-top {
      text-align: center;
      color: #ffffff;
      width: 100%;
    }

    .text-top h1 {
      font-size: 64px;
      line-height: 1.3;
      text-shadow: 0px 4px 20px rgba(0,0,0,0.6);
    }

    /* CONTENEDOR IMAGEN */
    .image-container {
      width: 100%;
      height: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .image-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain; /* 👈 NO se corta */
      border-radius: 20px;
    }

    /* TEXTO INFERIOR (REMATE) */
    .text-bottom {
      text-align: center;
      color: #ffffff;
    }

    .text-bottom h2 {
      font-size: 56px;
      text-shadow: 0px 4px 20px rgba(0,0,0,0.6);
    }

    /* LOGO */
    .logo {
      margin-top: 40px;
    }

    .logo img {
      width: 200px;
    }

  </style>
</head>

<body>

  <div class="story">

    <!-- TEXTO ARRIBA -->
    <div class="text-top">
      <h1>
        No podemos evitar que se pierdan 🐾💔
      </h1>
    </div>

    <!-- IMAGEN -->
    <div class="image-container">
      <!-- CAMBIA ESTA IMAGEN -->
      <img src="img/perro.jpg" alt="Mascota">
    </div>

    <!-- TEXTO ABAJO -->
    <div class="text-bottom">
      <h2>
        Pero sí ayudarlos a volver ❤️
      </h2>

      <!-- LOGO -->
      <div class="logo">
        <img src="img/logo.png" alt="UbiPet">
      </div>
    </div>

  </div>

</body>
</html>
