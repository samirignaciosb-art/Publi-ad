<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UbiPet Ad</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

/* Contenedor vertical 9:16 */
.container {
  position: relative;
  width: 100%;
  max-width: 420px;
  aspect-ratio: 9 / 16;
  overflow: hidden;
  background: #0f1f1c;
}

/* Slides */
.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
  opacity: 0;
  transition: opacity 1s ease;
}

.slide.active {
  opacity: 1;
}

/* Oscurecer fondo */
.overlay {
  background: rgba(0,0,0,0.55);
  padding: 20px;
  border-radius: 12px;
  margin: 20px;
}

h1 {
  font-size: 1.8em;
  line-height: 1.3;
}

/* Logo */
.logo {
  position: absolute;
  top: 15px;
  left: 15px;
  width: 90px;
}

/* Botón CTA */
.cta {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #25d366;
  color: white;
  padding: 12px 20px;
  border-radius: 50px;
  font-size: 1em;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

  <img src="img/logo.png" class="logo">

  <div class="slide active" style="background-image:url('img/slide1.png')">
    <div class="overlay">
      <h1>Tu mascota sale todos los días…</h1>
    </div>
  </div>

  <div class="slide" style="background-image:url('img/slide2.png')">
    <div class="overlay">
      <h1>Pero basta un segundo para que se pierda.</h1>
    </div>
  </div>

  <div class="slide" style="background-image:url('img/slide3.png')">
    <div class="overlay">
      <h1>Con UbiPet, quien la encuentre puede escanear su placa.</h1>
    </div>
  </div>

  <div class="slide" style="background-image:url('img/slide4.png')">
    <div class="overlay">
      <h1>Y tú recibes su ubicación al instante.</h1>
    </div>
  </div>

  <div class="slide" style="background-image:url('img/slide5.png')">
    <div class="overlay">
      <h1>UbiPet — Si se pierde, vuelve a casa.</h1>
    </div>
  </div>

  <a class="cta" href="https://www.ubipet.shop">Conocer más</a>

</div>

<script>
const slides = document.querySelectorAll('.slide');
let current = 0;

setInterval(() => {
  slides[current].classList.remove('active');
  current = (current + 1) % slides.length;
  slides[current].classList.add('active');
}, 3000);
</script>

</body>
</html>
