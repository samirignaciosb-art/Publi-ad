<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UbiPet Ad Story</title>

<style>
body {
  margin: 0;
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

/* Contenedor vertical 9:16 optimizado para Story */
.container {
  position: relative;
  width: 100%;
  max-width: 360px; 
  height: 640px;
  overflow: hidden;
  background: #000;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

/* Slides */
.slide {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display: flex;
  align-items: flex-end; /* Texto abajo para lucir las fotos de Sofi */
  justify-content: center;
  color: white;
  text-align: center;
  opacity: 0;
  transition: opacity 0.8s ease-in-out;
  z-index: 1;
}

.slide.active {
  opacity: 1;
  z-index: 2;
}

/* Overlay de gradiente para legibilidad del texto */
.overlay {
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
  padding: 80px 25px 100px 25px; /* Espacio extra abajo para el sticker de IG */
  width: 100%;
  box-sizing: border-box;
}

h1 {
  font-size: 1.7em;
  line-height: 1.25;
  margin: 0;
  font-weight: 700;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
}

/* Logo UbiPet */
.logo {
  position: absolute;
  top: 25px;
  left: 20px;
  width: 110px;
  z-index: 10;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
}
</style>
</head>

<body>

<div class="container">

  <img src="img/logo.png" class="logo" alt="UbiPet Logo">

  <div class="slide active" style="background-image: url('img/slide1.png');">
    <div class="overlay">
      <h1>Tu mascota sale todos los días…</h1>
    </div>
  </div>

  <div class="slide" style="background-image: url('img/slide2.png');">
    <div class="overlay">
      <h1>Pero basta un segundo para que se pierda.</h1>
    </div>
  </div>

  <div class="slide" style="background-image: url('img/slide3.png');">
    <div class="overlay">
      <h1>Con UbiPet, quien la encuentre escanea su placa.</h1>
    </div>
  </div>

  <div class="slide" style="background-image: url('img/slide4.png');">
    <div class="overlay">
      <h1>Y tú recibes su ubicación al instante.</h1>
    </div>
  </div>

  <div class="slide" style="background-image: url('img/slide5.png');">
    <div class="overlay">
      <h1>UbiPet — Si se pierde, vuelve a casa.</h1>
    </div>
  </div>

</div>

<script>
const slides = document.querySelectorAll('.slide');
let current = 0;

// Rotación cada 3.8 segundos para una lectura cómoda
setInterval(() => {
  slides[current].classList.remove('active');
  current = (current + 1) % slides.length;
  slides[current].classList.add('active');
}, 3800);
</script>

</body>
</html>
