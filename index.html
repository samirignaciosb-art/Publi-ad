<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UbiPet Creator PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
}

/* CANVAS */
#canvas {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* FONDO BASE (BRANDEADO 🔥) */
.hero {
  width: 100%;
  height: 100%;
  position: relative;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  background-size: cover;
  background-position: center;
}

/* OVERLAY PARA TEXTO */
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
}

/* TEXTO */
#preview {
  position: absolute;
  z-index: 2;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
  max-width: 85%;
  font-size: 28px;
  line-height: 1.5;
  text-shadow: 0 3px 12px rgba(0,0,0,0.9);
  cursor: grab;
}

/* LOGO */
#logo {
  position: absolute;
  z-index: 2;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  max-width: 120px;
}

/* PANEL */
.panel {
  position: fixed;
  right: -100%;
  top: 0;
  width: 320px;
  height: 100%;
  background: white;
  transition: 0.3s;
  padding: 10px;
  overflow-y: auto;
}

.panel.open { right: 0; }

.toggle {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 999;
}

/* EDITOR */
#editor {
  min-height: 120px;
  background: #eee;
  padding: 10px;
}

/* CONTROLES */
input, button {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
}

</style>
</head>

<body>

<div id="canvas">
  <div class="hero" id="hero"></div>
  <div id="preview"></div>
  <img id="logo" src="img/logo.png">
</div>

<button class="toggle" onclick="toggle()">⚙️</button>

<div class="panel" id="panel">

<h3>Editor</h3>

<div id="editor" contenteditable="true"></div>

<label>Tamaño texto</label>
<input type="range" min="18" max="70" value="28" id="fontSize">

<button onclick="toggleBold()">Negrita</button>

<label>Zoom imagen</label>
<input type="range" min="100" max="200" value="100" id="zoom">

<label>Posición imagen</label>
<input type="range" min="0" max="100" value="50" id="bgY">

<label>Tamaño logo</label>
<input type="range" min="50" max="300" value="120" id="logoSize">

<input type="file" id="imgUpload">

<button onclick="descargar()">📸 Descargar imagen</button>

<button onclick="guardar()">Guardar</button>
<button onclick="limpiar()">Limpiar</button>

</div>

<script>

const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const hero = document.getElementById("hero");
const logo = document.getElementById("logo");

// PANEL
function toggle() {
  panel.classList.toggle("open");
}

// TEXTO
editor.oninput = () => preview.innerHTML = editor.innerHTML;

// TEXTO STYLE
fontSize.oninput = e => preview.style.fontSize = e.target.value + "px";

function toggleBold() {
  preview.style.fontWeight =
    preview.style.fontWeight === "bold" ? "normal" : "bold";
}

// IMAGEN CONTROL
zoom.oninput = e => hero.style.backgroundSize = e.target.value + "%";
bgY.oninput = e => hero.style.backgroundPosition = "center " + e.target.value + "%";

// IMAGEN UPLOAD
imgUpload.onchange = e => {
  const reader = new FileReader();
  reader.onload = ev => {
    hero.style.backgroundImage = `url(${ev.target.result})`;
    localStorage.setItem("bg", ev.target.result);
  };
  reader.readAsDataURL(e.target.files[0]);
};

// LOGO SIZE
logoSize.oninput = e => logo.style.maxWidth = e.target.value + "px";

// DRAG
let offsetX = 0, offsetY = 0, dragging = false;

function startDrag(e) {
  dragging = true;
  const rect = preview.getBoundingClientRect();

  offsetX = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  offsetY = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
}

function moveDrag(e) {
  if (!dragging) return;

  const x = (e.touches ? e.touches[0].clientX : e.clientX) - offsetX;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - offsetY;

  preview.style.left = x + "px";
  preview.style.top = y + "px";
  preview.style.transform = "none";
}

function stopDrag() { dragging = false; }

preview.addEventListener("mousedown", startDrag);
document.addEventListener("mousemove", moveDrag);
document.addEventListener("mouseup", stopDrag);

preview.addEventListener("touchstart", startDrag);
document.addEventListener("touchmove", moveDrag);
document.addEventListener("touchend", stopDrag);

// EXPORTAR
function descargar() {
  html2canvas(document.getElementById("canvas")).then(canvas => {
    const link = document.createElement("a");
    link.download = "ubipet.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

// GUARDAR / CARGAR
function guardar() {
  localStorage.setItem("text", editor.innerHTML);
}

window.onload = () => {
  preview.innerHTML = localStorage.getItem("text") || "";
  editor.innerHTML = preview.innerHTML;

  const bg = localStorage.getItem("bg");
  if (bg) hero.style.backgroundImage = `url(${bg})`;
};

// LIMPIAR
function limpiar() {
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
