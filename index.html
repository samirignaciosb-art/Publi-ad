<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UbiPet Creator PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
}

/* CANVAS */
#canvas {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* HERO */
.hero {
  width: 100%;
  height: 100%;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #00c6a7, #007cf0);
}

/* IMÁGENES */
.hero img.main-img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: contain;
  z-index: 1;
}

.hero.vertical img.main-img {
  object-fit: cover;
}

.hero img.bg-blur {
  position: absolute;
  width: 110%;
  height: 110%;
  object-fit: cover;
  filter: blur(30px) brightness(0.6);
  z-index: 0;
}

/* OVERLAY */
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 2;
}

/* TEXTO */
#preview {
  position: absolute;
  z-index: 3;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
  max-width: 85%;
  font-size: 28px;
  line-height: 1.5;
  text-shadow: 0 3px 12px rgba(0,0,0,0.9);
  cursor: grab;
}

/* LOGO */
#logo {
  position: absolute;
  z-index: 3;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  max-width: 120px;
}

/* PANEL */
.panel {
  position: fixed;
  right: -100%;
  top: 0;
  width: 320px;
  height: 100%;
  background: white;
  transition: 0.3s;
  padding: 10px;
  overflow-y: auto;
  z-index: 1000;
}

.panel.open { right: 0; }

.toggle {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 1100;
}

/* EDITOR */
#editor {
  min-height: 120px;
  background: #eee;
  padding: 10px;
}

/* CONTROLES */
input, button {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
}

</style>
</head>

<body>

<div id="canvas">
  <div class="hero" id="hero">
    <img id="bgBlur" class="bg-blur" style="display:none;">
    <img id="mainImg" class="main-img" style="display:none;">
  </div>

  <div id="preview"></div>
  <img id="logo" src="img/logo.png">
</div>

<button class="toggle" onclick="toggle()">⚙️</button>

<div class="panel" id="panel">

<h3>Editor</h3>

<div id="editor" contenteditable="true"></div>

<label>Tamaño texto</label>
<input type="range" min="18" max="70" value="28" id="fontSize">

<button onclick="toggleBold()">Negrita</button>

<label>Tamaño logo</label>
<input type="range" min="50" max="300" value="120" id="logoSize">

<input type="file" id="imgUpload" accept="image/*">

<button onclick="descargar()">📸 Descargar imagen</button>

<button onclick="guardar()">Guardar</button>
<button onclick="limpiar()">Limpiar</button>

</div>

<script>

// ELEMENTOS
const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const hero = document.getElementById("hero");
const logo = document.getElementById("logo");
const mainImg = document.getElementById("mainImg");
const bgBlur = document.getElementById("bgBlur");
const panel = document.getElementById("panel");

// DEBUG
window.onerror = function (msg, url, line) {
  console.log("Error:", msg, "línea:", line);
};

// PANEL
function toggle() {
  panel.classList.toggle("open");
}

// TEXTO
editor.oninput = () => preview.innerHTML = editor.innerHTML;

// TEXTO STYLE
fontSize.oninput = e => preview.style.fontSize = e.target.value + "px";

function toggleBold() {
  preview.style.fontWeight =
    preview.style.fontWeight === "bold" ? "normal" : "bold";
}

// IMAGEN INTELIGENTE
imgUpload.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = ev => {
    const src = ev.target.result;

    mainImg.src = src;
    bgBlur.src = src;
    mainImg.style.display = "block";

    mainImg.onload = () => {
      const ratio = mainImg.naturalHeight / mainImg.naturalWidth;

      if (ratio > 1.2) {
        hero.classList.add("vertical");
        bgBlur.style.display = "none";
      } else {
        hero.classList.remove("vertical");
        bgBlur.style.display = "block";
      }
    };

    localStorage.setItem("bg", src);
  };

  reader.readAsDataURL(file);
};

// LOGO SIZE
logoSize.oninput = e => logo.style.maxWidth = e.target.value + "px";

// DRAG TEXTO (MEJORADO MÓVIL)
let offsetX = 0, offsetY = 0, dragging = false;

function startDrag(e) {
  dragging = true;
  const rect = preview.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;

  offsetX = clientX - rect.left;
  offsetY = clientY - rect.top;
}

function moveDrag(e) {
  if (!dragging) return;

  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;

  preview.style.left = (clientX - offsetX) + "px";
  preview.style.top = (clientY - offsetY) + "px";
  preview.style.transform = "none";
}

function stopDrag() { dragging = false; }

preview.addEventListener("mousedown", startDrag);
document.addEventListener("mousemove", moveDrag);
document.addEventListener("mouseup", stopDrag);

preview.addEventListener("touchstart", startDrag, { passive: true });
document.addEventListener("touchmove", moveDrag, { passive: true });
document.addEventListener("touchend", stopDrag);

// EXPORTAR
function descargar() {
  html2canvas(document.getElementById("canvas")).then(canvas => {
    const link = document.createElement("a");
    link.download = "ubipet.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}

// GUARDAR / CARGAR
function guardar() {
  localStorage.setItem("text", editor.innerHTML);
}

window.onload = () => {
  preview.innerHTML = localStorage.getItem("text") || "";
  editor.innerHTML = preview.innerHTML;

  const bg = localStorage.getItem("bg");

  if (bg) {
    mainImg.src = bg;
    bgBlur.src = bg;
    mainImg.style.display = "block";

    mainImg.onload = () => {
      const ratio = mainImg.naturalHeight / mainImg.naturalWidth;

      if (ratio > 1.2) {
        hero.classList.add("vertical");
        bgBlur.style.display = "none";
      } else {
        hero.classList.remove("vertical");
        bgBlur.style.display = "block";
      }
    };
  }
};

// LIMPIAR
function limpiar() {
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
