<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UbiPet Creator PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
}

/* CANVAS */
#canvas {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* FONDO */
.hero {
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
}

/* TEXTO */
#preview {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
  cursor: grab;
  max-width: 85%;
  line-height: 1.5;
  font-size: 28px;
  text-shadow: 0 3px 12px rgba(0,0,0,0.9);
}

/* LOGO */
#logo {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  max-width: 120px;
}

/* PANEL */
.panel {
  position: fixed;
  right: -100%;
  top: 0;
  width: 320px;
  height: 100%;
  background: white;
  transition: 0.3s;
  padding: 10px;
  overflow-y: auto;
}

.panel.open { right: 0; }

.toggle {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 999;
}

/* EDITOR */
#editor {
  min-height: 120px;
  background: #eee;
  padding: 10px;
}

/* CONTROLES */
input, button {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
}

</style>
</head>

<body>

<div id="canvas">
  <div class="hero" id="hero"></div>
  <div id="preview"></div>
  <img id="logo">
</div>

<button class="toggle" onclick="toggle()">⚙️</button>

<div class="panel" id="panel">

<h3>Editor</h3>

<div id="editor" contenteditable="true"></div>

<label>Tamaño texto</label>
<input type="range" min="18" max="70" value="28" id="fontSize">

<button onclick="toggleBold()">Negrita</button>

<label>Zoom fondo</label>
<input type="range" min="100" max="200" value="100" id="zoom">

<label>Posición fondo</label>
<input type="range" min="0" max="100" value="50" id="bgY">

<h4>Logo</h4>
<input type="file" id="logoUpload">
<label>Tamaño logo</label>
<input type="range" min="50" max="300" value="120" id="logoSize">

<input type="file" id="imgUpload">

<button onclick="descargar()">📸 Descargar imagen</button>

<button onclick="guardar()">Guardar</button>
<button onclick="limpiar()">Limpiar</button>

</div>

<script>

const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const hero = document.getElementById("hero");
const logo = document.getElementById("logo");

// PANEL
function toggle() {
  panel.classList.toggle("open");
}

// TEXTO
editor.oninput = () => preview.innerHTML = editor.innerHTML;

// TAMAÑO TEXTO
fontSize.oninput = e => preview.style.fontSize = e.target.value + "px";

// NEGRITA
function toggleBold() {
  preview.style.fontWeight =
    preview.style.fontWeight === "bold" ? "normal" : "bold";
}

// FONDO
zoom.oninput = e => hero.style.backgroundSize = e.target.value + "%";
bgY.oninput = e => hero.style.backgroundPosition = "center " + e.target.value + "%";

// IMAGEN
imgUpload.onchange = e => {
  const reader = new FileReader();
  reader.onload = ev => {
    hero.style.backgroundImage = `url(${ev.target.result})`;
    localStorage.setItem("bg", ev.target.result);
  };
  reader.readAsDataURL(e.target.files[0]);
};

// LOGO
logoUpload.onchange = e => {
  const reader = new FileReader();
  reader.onload = ev => {
    logo.src = ev.target.result;
    localStorage.setItem("logo", ev.target.result);
  };
  reader.readAsDataURL(e.target.files[0]);
};

logoSize.oninput = e => {
  logo.style.maxWidth = e.target.value + "px";
};

// DRAG TEXTO
let drag = false;

preview.onmousedown = () => drag = true;
document.onmouseup = () => drag = false;

document.onmousemove = e => {
  if (!drag) return;
  preview.style.left = e.clientX + "px";
  preview.style.top = e.clientY + "px";
  preview.style.transform = "none";
};

// EXPORTAR IMAGEN 🔥
function descargar() {
  html2canvas(document.getElementById("canvas")).then(canvas => {
    const link = document.createElement("a");
    link.download = "ubipet.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

// GUARDAR
function guardar() {
  localStorage.setItem("text", editor.innerHTML);
}

// CARGAR
window.onload = () => {
  preview.innerHTML = localStorage.getItem("text") || "";
  editor.innerHTML = preview.innerHTML;

  const bg = localStorage.getItem("bg");
  if (bg) hero.style.backgroundImage = `url(${bg})`;

  const lg = localStorage.getItem("logo");
  if (lg) logo.src = lg;
};

// LIMPIAR
function limpiar() {
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
