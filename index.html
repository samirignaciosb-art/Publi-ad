<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>UbiPet Story Tool</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Georgia", serif;
    }

    body {
      display: flex;
      background: #111;
      color: white;
    }

    /* STORY */
    .story {
      width: 1080px;
      height: 1920px;
      background-color: #f5f1eb;
      position: relative;
      overflow: hidden;
      margin: auto;
    }

    h1, h2 {
      text-shadow: 0px 4px 20px rgba(0,0,0,0.7);
      text-align: center;
    }

    h1 { font-size: 64px; }
    h2 { font-size: 56px; }

    /* TEXTOS MOVIBLES */
    .text {
      position: absolute;
      width: 100%;
      cursor: grab;
      padding: 0 40px;
    }

    #topText { top: 200px; }
    #bottomText { top: 1400px; }

    /* IMAGEN */
    .image-container {
      position: absolute;
      top: 30%;
      width: 100%;
      height: 40%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .image-container img {
      max-width: 90%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 20px;
    }

    /* LOGO */
    .logo {
      position: absolute;
      bottom: 60px;
      width: 100%;
      text-align: center;
    }

    .logo img {
      width: 200px;
    }

    /* PANEL */
    .panel {
      width: 300px;
      padding: 20px;
      background: #222;
      position: fixed;
      right: 0;
      top: 0;
      height: 100%;
      overflow: auto;
    }

    .panel input {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

    .panel button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      background: #4CAF50;
      border: none;
      color: white;
      cursor: pointer;
    }

    .panel .secondary {
      background: #ff9800;
    }

    /* BORDE AL MOVER */
    .text:active {
      outline: 2px dashed white;
    }

  </style>
</head>

<body>

  <!-- STORY -->
  <div class="story" id="story">

    <div class="text" id="topText">
      <h1 id="textTop">No podemos evitar que se pierdan 🐾💔</h1>
    </div>

    <div class="image-container">
      <img id="img" src="img/perro.jpeg">
    </div>

    <div class="text" id="bottomText">
      <h2 id="textBottom">Pero sí ayudarlos a volver ❤️</h2>
    </div>

    <div class="logo">
      <img src="img/logo.png">
    </div>

  </div>

  <!-- PANEL -->
  <div class="panel" id="panel">
    <h3>Editor UbiPet</h3>

    <label>Texto arriba</label>
    <input type="text" id="inputTop">

    <label>Texto abajo</label>
    <input type="text" id="inputBottom">

    <label>Subir imagen</label>
    <input type="file" id="uploadImg">

    <label>Tamaño texto arriba</label>
    <input type="range" id="sizeTop" min="30" max="120">

    <label>Tamaño texto abajo</label>
    <input type="range" id="sizeBottom" min="30" max="120">

    <button onclick="aplicarCambios()">Aplicar</button>

    <button class="secondary" onclick="modoCaptura()">Modo captura 📸</button>
  </div>

  <script>
    function aplicarCambios() {
      const top = document.getElementById("inputTop").value;
      const bottom = document.getElementById("inputBottom").value;

      if (top) document.getElementById("textTop").innerText = top;
      if (bottom) document.getElementById("textBottom").innerText = bottom;
    }

    // SLIDERS TAMAÑO
    document.getElementById("sizeTop").addEventListener("input", (e) => {
      document.getElementById("textTop").style.fontSize = e.target.value + "px";
    });

    document.getElementById("sizeBottom").addEventListener("input", (e) => {
      document.getElementById("textBottom").style.fontSize = e.target.value + "px";
    });

    // SUBIR IMAGEN
    document.getElementById("uploadImg").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (file) {
        const url = URL.createObjectURL(file);
        document.getElementById("img").src = url;
      }
    });

    // DRAG & DROP
    function hacerMovible(el) {
      let offsetX = 0, offsetY = 0, isDragging = false;

      el.addEventListener("mousedown", (e) => {
        isDragging = true;
        offsetX = e.clientX - el.offsetLeft;
        offsetY = e.clientY - el.offsetTop;
        el.style.cursor = "grabbing";
      });

      document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        el.style.left = (e.clientX - offsetX) + "px";
        el.style.top = (e.clientY - offsetY) + "px";
      });

      document.addEventListener("mouseup", () => {
        isDragging = false;
        el.style.cursor = "grab";
      });

      // MOBILE
      el.addEventListener("touchstart", (e) => {
        isDragging = true;
        const touch = e.touches[0];
        offsetX = touch.clientX - el.offsetLeft;
        offsetY = touch.clientY - el.offsetTop;
      });

      document.addEventListener("touchmove", (e) => {
        if (!isDragging) return;
        const touch = e.touches[0];
        el.style.left = (touch.clientX - offsetX) + "px";
        el.style.top = (touch.clientY - offsetY) + "px";
      });

      document.addEventListener("touchend", () => {
        isDragging = false;
      });
    }

    hacerMovible(document.getElementById("topText"));
    hacerMovible(document.getElementById("bottomText"));

    // MODO CAPTURA
    function modoCaptura() {
      document.getElementById("panel").style.display = "none";
      document.body.style.background = "#000";
    }
  </script>

</body>
</html>
