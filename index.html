<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UbiPet Creator</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
  overflow: hidden;
}

/* HERO */
.hero {
  width: 100vw;
  height: 100vh;
  background-size: cover;
  background-position: center;
  position: relative;
}

/* TEXTO */
#preview {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  cursor: grab;
  max-width: 85%;
  text-align: center;
  font-size: 22px;
  line-height: 1.6;
  user-select: none;
}

/* BOTÓN PANEL */
.toggle-btn {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.4);
  border: none;
  color: white;
  padding: 6px 8px;
  border-radius: 6px;
  z-index: 999;
}

/* PANEL */
.panel {
  position: fixed;
  top: 0;
  right: -100%;
  width: 320px;
  height: 100%;
  background: #fff;
  color: #000;
  transition: 0.3s;
  z-index: 998;
  display: flex;
  flex-direction: column;
}

.panel.open { right: 0; }

.panel-content {
  padding: 12px;
  overflow-y: auto;
}

/* EDITOR */
#editor {
  min-height: 180px;
  background: #f5f5f5;
  padding: 10px;
  border-radius: 8px;
  outline: none;
}

/* BOTONES */
button {
  margin-top: 8px;
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.save { background: #28a745; color: white; }
.clear { background: #dc3545; color: white; }
.template { background: #007bff; color: white; }

/* INPUT */
input { margin-top: 8px; }

</style>
</head>

<body>

<div class="hero" id="hero">
  <div id="preview"></div>
</div>

<button class="toggle-btn" onclick="togglePanel()">✏️</button>

<div class="panel" id="panel">
  <div class="panel-content">

    <h3>Editor</h3>

    <div id="editor" contenteditable="true"></div>

    <button class="template" onclick="plantilla1()">Hook Viral</button>
    <button class="template" onclick="plantilla2()">Venta Directa</button>

    <input type="file" id="imgUpload" accept="image/*">

    <button class="save" onclick="guardar()">Guardar</button>
    <button class="clear" onclick="limpiar()">Limpiar</button>

  </div>
</div>

<script>

const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const hero = document.getElementById("hero");
const imgUpload = document.getElementById("imgUpload");

// PANEL
function togglePanel() {
  document.getElementById("panel").classList.toggle("open");
}

// TEXTO EN VIVO
editor.addEventListener("input", () => {
  preview.innerHTML = editor.innerHTML;
});

// PLANTILLAS
function plantilla1() {
editor.innerHTML = `Se pierde…

Lo encuentran

Pero no vuelve


¿Por qué?`;
preview.innerHTML = editor.innerHTML;
}

function plantilla2() {
editor.innerHTML = `No es un QR

Es su forma de volver a casa 🐾`;
preview.innerHTML = editor.innerHTML;
}

// GUARDAR
function guardar() {
  localStorage.setItem("text", editor.innerHTML);
  localStorage.setItem("posX", preview.style.left);
  localStorage.setItem("posY", preview.style.top);
}

// CARGAR
window.onload = () => {
  preview.innerHTML = localStorage.getItem("text") || "";
  editor.innerHTML = preview.innerHTML;

  const bg = localStorage.getItem("bg");
  if (bg) hero.style.backgroundImage = `url(${bg})`;

  const x = localStorage.getItem("posX");
  const y = localStorage.getItem("posY");

  if (x && y) {
    preview.style.left = x;
    preview.style.top = y;
    preview.style.transform = "none";
  }
};

// LIMPIAR
function limpiar() {
  if(confirm("¿Borrar todo?")) {
    preview.innerHTML = "";
    editor.innerHTML = "";
    localStorage.clear();
  }
}

// IMAGEN
imgUpload.addEventListener("change", e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = ev => {
    hero.style.backgroundImage = `url(${ev.target.result})`;
    localStorage.setItem("bg", ev.target.result);
  };

  reader.readAsDataURL(file);
});

// DRAG (MOUSE + TOUCH FIX 🔥)
let isDragging = false;

function startDrag(e) {
  isDragging = true;
}

function stopDrag() {
  isDragging = false;
}

function moveDrag(e) {
  if (!isDragging) return;

  let x = e.clientX || e.touches[0].clientX;
  let y = e.clientY || e.touches[0].clientY;

  preview.style.left = x + "px";
  preview.style.top = y + "px";
  preview.style.transform = "none";
}

preview.addEventListener("mousedown", startDrag);
document.addEventListener("mouseup", stopDrag);
document.addEventListener("mousemove", moveDrag);

preview.addEventListener("touchstart", startDrag);
document.addEventListener("touchend", stopDrag);
document.addEventListener("touchmove", moveDrag);

</script>

</body>
</html>
