<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" id="theme-meta" content="#ffffff">
  <meta name="description" content="UbiPet — Protege a tu mascota con un QR de rescate">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="UbiPet">

  <title>UbiPet</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/styles.css" onload="document.body.classList.add('css-ready')">
  <style>body{opacity:0;transition:opacity 0.25s ease}body.ready{opacity:1}</style>
</head>
<body>

  <!-- ── AUTH SCREEN ── -->
  <div id="auth-screen">
    <div class="auth-box">
      <div class="auth-logo">
        <img src="/img/logo.png" alt="UbiPet" class="auth-logo-img">
      </div>
      <div id="auth-content"></div>
    </div>
  </div>

  <!-- ── APP SHELL ── -->
  <div id="app" class="hidden">

    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <img src="/img/logo.png" alt="UbiPet" class="header-logo">
        <div class="header-actions">
          <button class="icon-btn" onclick="navigate('perfil')" id="nav-perfil" title="Mi mascota">🐾</button>
          <button class="icon-btn" id="nav-menu" onclick="toggleMenu()" title="Menú">☰</button>
        </div>
      </div>
    </header>

    <!-- Menú lateral -->
    <div id="menu-overlay" class="menu-overlay" onclick="closeMenu()"></div>
    <nav id="side-menu" class="side-menu">
      <div class="menu-header">
        <span id="menu-user-email" class="menu-email"></span>
        <button class="icon-btn" onclick="closeMenu()">✕</button>
      </div>
      <div class="menu-items">
        <button class="menu-item" onclick="navigate('perfil'); closeMenu()">🐾 Mis mascotas</button>
        <button class="menu-item" id="menu-comunidad" onclick="navigate('comunidad'); closeMenu()">🗺️ Comunidad</button>
        <button class="menu-item" onclick="navigate('cuenta'); closeMenu()">👤 Mi cuenta</button>
        <button class="menu-item" id="menu-admin" style="display:none" onclick="navigate('admin'); closeMenu()">⚙️ Admin</button>
        <div class="menu-divider"></div>
        <button class="menu-item menu-item--danger" onclick="doLogout()">↩ Cerrar sesión</button>
      </div>
    </nav>

    <!-- Contenido principal -->
    <main id="main-content" class="main-content"></main>

  </div>

  <!-- ── TOAST ── -->
  <div id="toast" class="toast">
    <span id="toast-icon"></span>
    <span id="toast-msg"></span>
  </div>

  <!-- ── SCRIPTS ── -->
  <script type="module" src="/js/app.js"></script>
  <script src="/js/pwa.js" defer></script>
</body>
</html>
