<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UbiPet Ad</title>

<style>
body {
  margin: 0;
  background: #1a1a1a; /* Un gris muy oscuro para resaltar el frame */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Contenedor vertical 9:16 */
.container {
  position: relative;
  width: 100%;
  max-width: 360px; /* Tamaño estándar de Story */
  height: 640px;
  overflow: hidden;
  background: #000;
  border-radius: 15px; /* Bordes redondeados para el video */
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Slides */
.slide {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display: flex;
  align-items: flex-end; /* Texto hacia abajo para no tapar la cara de Sofi */
  justify-content: center;
  color: white;
  text-align: center;
  opacity: 0;
  transition: opacity 0.8s ease-in-out;
  z-index: 1;
}

.slide.active {
  opacity: 1;
  z-index: 2;
}

/* Oscurecer fondo solo detrás del texto para legibilidad */
.overlay {
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  padding: 60px 20px 80px 20px;
  width: 100%;
  box-sizing: border-box;
}

h1 {
  font-size: 1.6em;
  line-height: 1.2;
  margin: 0;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

/* Logo con mayor visibilidad */
.logo {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 100px;
  z-index: 10;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

/* Botón CTA estilo WhatsApp */
.cta {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #25d366;
  color: white;
  padding: 14px 28px;
  border-radius: 50px;
  font-size: 1.1em;
  font-weight: bold;
  text-decoration: none;
  z-index: 10;
  box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
}
</style>
</head>

<body>

<div class="container">

  <img src="img/logo.png" class="logo" alt="UbiPet Logo">

  <div class="slide active" style="background-image: url('img/slide1.png');">
    <div class="overlay">
      <h1>Tu mascota sale todos los días…</h1>
    </div>
  </div>

  <div class="slide" style="background-image: url('img/slide2.png');">
    <div class="overlay">
      <h1>Pero basta un segundo para que se pierda.</h1>
    </div>
  </div>

  <div class="slide" style="background-image: url('img/slide3.png');">
    <div class="overlay">
      <h1>Con UbiPet, quien la encuentre escanea su placa.</h1>
    </div>
  </div>

  <div class="slide" style="background-image: url('img/slide4.png');">
    <div class="overlay">
      <h1>Y tú recibes su ubicación al instante.</h1>
    </div>
  </div>

  <div class="slide" style="background-image: url('img/slide5.png');">
    <div class="overlay">
      <h1>UbiPet — Si se pierde, vuelve a casa.</h1>
    </div>
  </div>

  <a class="cta" href="https://www.ubipet.shop">¡Quiero mi placa!</a>

</div>

<script>
const slides = document.querySelectorAll('.slide');
let current = 0;

setInterval(() => {
  slides[current].classList.remove('active');
  current = (current + 1) % slides.length;
  slides[current].classList.add('active');
}, 3500); // 3.5 segundos para que dé tiempo de leer
</script>

</body>
</html>
