<!-- UbiPet Ad Repository - Single file version for easy deployment -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UbiPet Ad</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1f1c;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      width: 100vw;
      height: 100vh;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .slide.active {
      opacity: 1;
      z-index: 1;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.5);
      padding: 20px;
      border-radius: 10px;
    }

    h1 {
      font-size: 2.5em;
      margin: 0;
    }

    .logo {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 120px;
    }

    .cta {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #25d366;
      color: white;
      padding: 15px 25px;
      border-radius: 50px;
      font-size: 1.2em;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <img src="img/logo.png" class="logo" />

  <div class="slide active" style="background-image:url('img/slide1.jpg')">
    <div class="overlay">
      <h1>Tu mascota sale todos los días…</h1>
    </div>
  </div>

  <div class="slide" style="background-image:url('img/slide2.jpg')">
    <div class="overlay">
      <h1>Pero basta un segundo para que se pierda.</h1>
    </div>
  </div>

  <div class="slide" style="background-image:url('img/slide3.jpg')">
    <div class="overlay">
      <h1>Con UbiPet, quien la encuentre puede escanear su placa.</h1>
    </div>
  </div>

  <div class="slide" style="background-image:url('img/slide4.jpg')">
    <div class="overlay">
      <h1>Y tú recibes su ubicación al instante.</h1>
    </div>
  </div>

  <div class="slide" style="background-image:url('img/slide5.jpg')">
    <div class="overlay">
      <h1>UbiPet — Si se pierde, vuelve a casa.</h1>
    </div>
  </div>

  <a class="cta" href="https://www.ubipet.shop">Conocer más</a>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;

    setInterval(() => {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }, 3000);
  </script>
</body>
</html>
