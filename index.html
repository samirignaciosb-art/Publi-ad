<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>UbiPet Story Editor</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Georgia", serif;
    }

    body {
      display: flex;
      background: #111;
      color: white;
    }

    /* STORY */
    .story {
      width: 1080px;
      height: 1920px;
      background-color: #f5f1eb;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 80px 60px;
      margin: auto;
    }

    .text-top, .text-bottom {
      text-align: center;
      width: 100%;
      position: relative;
    }

    h1, h2 {
      text-shadow: 0px 4px 20px rgba(0,0,0,0.6);
    }

    h1 { font-size: 64px; }
    h2 { font-size: 56px; }

    .image-container {
      height: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 20px;
    }

    .logo img {
      width: 200px;
    }

    /* PANEL */
    .panel {
      width: 300px;
      padding: 20px;
      background: #222;
      position: fixed;
      right: 0;
      top: 0;
      height: 100%;
      overflow: auto;
    }

    .panel input, .panel select {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

    .panel button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      border: none;
      color: white;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <!-- STORY -->
  <div class="story">

    <div class="text-top" id="topText">
      <h1 id="textTop">No podemos evitar que se pierdan 🐾💔</h1>
    </div>

    <div class="image-container">
      <img id="img" src="img/perro.jpg">
    </div>

    <div class="text-bottom" id="bottomText">
      <h2 id="textBottom">Pero sí ayudarlos a volver ❤️</h2>

      <div class="logo">
        <img src="img/logo.png">
      </div>
    </div>

  </div>

  <!-- PANEL EDITOR -->
  <div class="panel">
    <h3>Editor UbiPet</h3>

    <label>Texto arriba</label>
    <input type="text" id="inputTop">

    <label>Texto abajo</label>
    <input type="text" id="inputBottom">

    <label>Posición texto arriba</label>
    <select id="posTop">
      <option value="flex-start">Arriba</option>
      <option value="center">Centro</option>
      <option value="flex-end">Abajo</option>
    </select>

    <label>Posición texto abajo</label>
    <select id="posBottom">
      <option value="flex-start">Arriba</option>
      <option value="center">Centro</option>
      <option value="flex-end">Abajo</option>
    </select>

    <button onclick="aplicarCambios()">Aplicar</button>
  </div>

  <script>
    function aplicarCambios() {
      const top = document.getElementById("inputTop").value;
      const bottom = document.getElementById("inputBottom").value;

      if (top) document.getElementById("textTop").innerText = top;
      if (bottom) document.getElementById("textBottom").innerText = bottom;

      document.getElementById("topText").style.justifyContent = document.getElementById("posTop").value;
      document.getElementById("bottomText").style.justifyContent = document.getElementById("posBottom").value;
    }
  </script>

</body>
</html>
